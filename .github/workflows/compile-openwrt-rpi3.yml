name: Compile OpenWRT for RPi 3B - iRouter v1.0

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout OpenWRT 25.12.4
        uses: actions/checkout@v4
        with:
          repository: openwrt/openwrt
          ref: v25.12.4   # 最新穩定版

      - name: Update Feeds
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Create Custom Config
        run: |
          cat > .config << EOF
          # 目標平台 - Raspberry Pi 3B 64-bit
          CONFIG_TARGET_bcm27xx=y
          CONFIG_TARGET_bcm27xx_bcm2710=y
          CONFIG_TARGET_bcm27xx_bcm2710_RPI_3=y
          CONFIG_TARGET_ARCH_64BIT=y

          # 基本設定
          CONFIG_HOSTNAME="iRouter"
          CONFIG_LUCI_LANG_zh_Hans=y
          CONFIG_LUCI_THEME_bootstrap=y

          # 插件（只保留你需要的）
          CONFIG_PACKAGE_luci-app-passwall=y
          CONFIG_PACKAGE_luci-app-ddns=y
          CONFIG_PACKAGE_luci-app-qbittorrent=y
          CONFIG_PACKAGE_luci-app-ttyd=y
          CONFIG_PACKAGE_automount=y
          CONFIG_PACKAGE_luci-app-docker=y
          CONFIG_PACKAGE_docker=y
          CONFIG_PACKAGE_dockerd=y

          # Overlay 擴容到 4096M
          CONFIG_TARGET_ROOTFS_PARTSIZE=4096
          EOF

      - name: Defconfig
        run: make defconfig

      - name: Firstboot Script (LAN IP、密碼、旁路由、版本顯示)
        run: |
          mkdir -p files/etc/uci-defaults
          cat > files/etc/uci-defaults/99-irouter-settings << 'EOL'
          #!/bin/sh
          # LAN 設定 - 旁路由模式
          uci set network.lan.ipaddr='192.168.192.254'
          uci set network.lan.netmask='255.255.255.0'
          uci set network.lan.gateway='192.168.192.1'
          uci set network.lan.proto='static'
          uci set dhcp.lan.ignore='1'
          uci commit network
          uci commit dhcp

          # 密碼
          echo -e "Mz2156822\nMz2156822" | passwd root

          # 固件版本顯示
          uci set system.@system[0].version='iRouter v1.0'
          uci commit system

          # 重啟網路
          /etc/init.d/network restart
          EOL
          chmod +x files/etc/uci-defaults/99-irouter-settings

      - name: Compile
        run: |
          make download -j$(nproc) || true
          make -j$(nproc) || make -j1 V=s

      - name: Upload Firmware
        uses: actions/upload-artifact@v4
        with:
          name: OpenWRT-iRouter-v1.0-RPi3B
          path: bin/targets/bcm27xx/bcm2710/
