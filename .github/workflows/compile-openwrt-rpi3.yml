name: Compile OpenWRT for RPi 3B (Custom)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout OpenWRT
        uses: actions/checkout@v4
        with:
          repository: openwrt/openwrt
          ref: openwrt-24.10   # 穩定版，可改 main

      - name: Update Feeds
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Create Custom Config
        run: |
          cat > .config << EOF
          # 目標平台 - Raspberry Pi 3B 64-bit
          CONFIG_TARGET_bcm27xx=y
          CONFIG_TARGET_bcm27xx_bcm2710=y
          CONFIG_TARGET_bcm27xx_bcm2710_RPI_3=y
          CONFIG_TARGET_ARCH_64BIT=y

          # 基本設定
          CONFIG_HOSTNAME="iRouter"
          CONFIG_LUCI_LANG_zh_Hans=y
          CONFIG_LUCI_THEME_bootstrap=y

          # 插件
          CONFIG_PACKAGE_luci-app-passwall=y
          CONFIG_PACKAGE_luci-app-ddns=y
          CONFIG_PACKAGE_luci-app-qbittorrent=y
          CONFIG_PACKAGE_luci-app-ttyd=y
          CONFIG_PACKAGE_automount=y
          CONFIG_PACKAGE_luci-app-docker=y
          CONFIG_PACKAGE_docker=y
          CONFIG_PACKAGE_dockerd=y

          # 網路設定（旁路由模式）
          CONFIG_PACKAGE_luci-proto-ipv4=y
          # LAN IP 與其他設定會在首次啟動腳本處理

          # 根目錄擴容（Overlay）
          CONFIG_TARGET_ROOTFS_PARTSIZE=4096

          # 其他常用
          CONFIG_PACKAGE_luci=y
          CONFIG_PACKAGE_luci-ssl=y
          EOF

      - name: Defconfig & Compile
        run: |
          make defconfig
          make download -j$(nproc) || true
          make -j$(nproc) || make -j1 V=s

      - name: Firstboot Script (設定 LAN IP、密碼、旁路由)
        run: |
          mkdir -p files/etc/uci-defaults
          cat > files/etc/uci-defaults/99-custom-settings << 'EOL'
          #!/bin/sh
          # LAN IP
          uci set network.lan.ipaddr='192.168.192.254'
          uci set network.lan.netmask='255.255.255.0'
          uci set network.lan.gateway='192.168.192.1'
          uci set network.lan.proto='static'
          uci delete dhcp.lan.ignore
          uci set dhcp.lan.ignore='1'
          uci commit network
          uci commit dhcp

          # 密碼
          echo -e "Mz2156822\nMz2156822" | passwd root

          # 主機名
          uci set system.@system[0].hostname='iRouter'
          uci commit system

          # 重啟生效
          /etc/init.d/network restart
          EOL
          chmod +x files/etc/uci-defaults/99-custom-settings

      - name: Upload Firmware
        uses: actions/upload-artifact@v4
        with:
          name: OpenWRT-RPi3B-Custom
          path: |
            bin/targets/bcm27xx/bcm2710/openwrt-*-bcm27xx-bcm2710-rpi-3-ext4-*.img.gz
            bin/targets/bcm27xx/bcm2710/openwrt-*-bcm27xx-bcm2710-rpi-3-squashfs-*.img.gz
